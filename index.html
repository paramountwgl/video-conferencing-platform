    <style>
        :root { --gold: #c5a059; --dark-blue: #030a1a; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--dark-blue); 
            color: white; 
            margin: 0; 
            overflow-y: auto; /* Force scrolling enabled */
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: -1;
        }

        /* FIXED: Give the wrapper a solid height so Jitsi tools don't collapse */
        #meeting-wrapper {
            position: relative;
            width: 100%;
            height: 85vh; 
            min-height: 600px;
            background: #000;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            #meeting-wrapper { 
                height: 75vh; 
                min-height: 450px; 
            }
            .name-main { font-size: 1.1rem !important; }
        }

        #meeting-container { width: 100%; height: 100%; }
        #main-body:fullscreen header {
    background: #020617; /* Ensure header stays dark */
}

#main-body:fullscreen #meeting-wrapper {
    height: calc(100vh - 80px); /* Adjust height to make room for header */
}

        /* Fullscreen Logic */
        #meeting-wrapper:fullscreen { height: 100vh !important; }
        #meeting-wrapper:-webkit-full-screen { height: 100vh !important; }
    </style>
</head>
<body class="flex flex-col" id="main-body">

    <header class="p-3 md:p-4 border-b-2 border-[#c5a059] flex justify-between items-center bg-[#020617] z-50">
        <div class="flex items-center gap-2 md:gap-4">
            <img src="School logo 2.png" class="h-10 w-10 md:h-12 md:w-12 object-contain" alt="Logo">
            <div>
                <h1 style="font-family: 'Cinzel';" class="name-main text-lg md:text-xl text-[#c5a059] leading-none">PARAMOUNT</h1>
                <p class="name-sub text-[8px] md:text-[10px] tracking-widest uppercase text-gray-400 mt-1">Staff Meeting Room</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="brandedFS" class="text-[10px] font-bold border border-[#c5a059] text-[#c5a059] px-4 py-2 rounded hover:bg-[#c5a059] hover:text-black transition-all flex items-center gap-2">
                <i class="fas fa-expand"></i> <span id="fsText">FULLSCREEN MODE</span>
            </button>
             <div class="hidden sm:block">
                <span class="text-[9px] bg-green-900/30 text-green-400 px-2 py-1 rounded-full border border-green-500/50 uppercase font-bold tracking-widest">Secure Connection</span>
            </div>

        </div>
    </header>

    <main id="meeting-wrapper">
        <div id="meeting-container"></div>
    </main>

    <footer class="bg-[#020617] py-10 text-center border-t border-gray-800">
        <div class="max-w-4xl mx-auto px-4">
            <p class="text-[9px] md:text-[11px] text-gray-500 mb-6 uppercase tracking-widest font-semibold">
                &copy; 2026 Paramount English Medium School | All Rights Reserved | Warangal.
            </p>
            <div class="flex justify-center gap-8">
                <a href="https://www.facebook.com/paramountschoolwgl" target="_blank" class="text-white text-2xl hover:text-[#c5a059]"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/paramount.07" target="_blank" class="text-white text-2xl hover:text-[#c5a059]"><i class="fab fa-instagram"></i></a>
                <a href="https://youtube.com/@paramountschoolwgl" target="_blank" class="text-white text-2xl hover:text-[#c5a059]"><i class="fab fa-youtube"></i></a>
                <a href="https://wa.me/919000641355" target="_blank" class="text-white text-2xl hover:text-[#c5a059]"><i class="fab fa-whatsapp"></i></a>
                <a href="tel:+919000641355" target="_blank" class="text-white text-1xl hover:text-[#c5a059]"><i class="fas fa-phone"></i></a>
            </div>
        </div>
    </footer>

    <div id="feedbackModal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] hidden p-4">
        <div class="bg-white rounded-3xl p-6 md:p-10 max-w-sm w-full text-center shadow-2xl border-b-8 border-[#c5a059]">
            <h2 style="font-family: 'Cinzel';" class="text-[#030a1a] text-xl md:text-2xl font-bold mb-2 uppercase">Session Ended</h2>
            <div class="flex justify-center gap-2 mb-8" id="starRating">
                <i class="fas fa-star text-3xl cursor-pointer text-gray-200" data-value="1"></i>
                <i class="fas fa-star text-3xl cursor-pointer text-gray-200" data-value="2"></i>
                <i class="fas fa-star text-3xl cursor-pointer text-gray-200" data-value="3"></i>
                <i class="fas fa-star text-3xl cursor-pointer text-gray-200" data-value="4"></i>
                <i class="fas fa-star text-3xl cursor-pointer text-gray-200" data-value="5"></i>
            </div>
            <button id="submitFeedback" class="bg-[#030a1a] text-[#c5a059] py-3 rounded-xl font-bold w-full">Submit Feedback</button>
            <div id="thankYou" class="hidden text-green-600 font-bold mt-4">Thank you!</div>
        </div>
    </div>

    <script>
        const appId = "vpaas-magic-cookie-7e7f7c3e56a447c6a53a512920daf90c"; 
        const roomName = "Paramount_Staff_Secure_Meet";
        let api = null;

        window.onload = () => {
            const options = {
                roomName: appId + "/" + roomName,
                width: "100%", 
                height: "100%",
                parentNode: document.querySelector('#meeting-container'),
                configOverwrite: { 
                    prejoinPageEnabled: false, 
                    disableDeepLinking: true 
                },
                interfaceConfigOverwrite: {
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_BRAND_WATERMARK: false,
                    MOBILE_APP_PROMO: false,
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'desktop', 'chat', 'settings', 
                        'raisehand', 'videoquality', 'tileview', 'hangup'
                    ],
                }
            };
            
            api = new JitsiMeetExternalAPI("8x8.vc", options);
            
            // CRITICAL: Forces the meeting to re-calculate its height upon joining
            api.addEventListener('videoConferenceJoined', () => {
                const iframe = api.getIFrame();
                if (iframe) {
                    iframe.style.height = "100%";
                    iframe.style.width = "100%";
                }
            });

            api.addEventListener('videoConferenceLeft', () => {
                document.getElementById('meeting-wrapper').style.display = 'none';
                document.getElementById('feedbackModal').classList.remove('hidden');
            });
        };

        // Fullscreen Logic
        // Fullscreen Logic
const fsBtn = document.getElementById('brandedFS');
const fsText = document.getElementById('fsText');

fsBtn.addEventListener('click', () => {
    // We target the root element (the whole page)
    const docElm = document.documentElement;

    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        // ENTER FULLSCREEN
        if (docElm.requestFullscreen) {
            docElm.requestFullscreen();
        } else if (docElm.webkitRequestFullscreen) {
            docElm.webkitRequestFullscreen(); // Support for Safari/iOS
        } else if (docElm.msRequestFullscreen) {
            docElm.msRequestFullscreen(); // Support for IE/Edge
        }
        
        fsText.innerText = "EXIT FULLSCREEN";
        fsBtn.querySelector('i').classList.replace('fa-expand', 'fa-compress');
    } else {
        // EXIT FULLSCREEN
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
        }
        
        fsText.innerText = "FULLSCREEN MODE";
        fsBtn.querySelector('i').classList.replace('fa-compress', 'fa-expand');
    }
});

// Sync button text if user exits using 'Esc' key
const syncFS = () => {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        fsText.innerText = "FULLSCREEN MODE";
        fsBtn.querySelector('i').classList.replace('fa-compress', 'fa-expand');
    }
};
document.addEventListener('fullscreenchange', syncFS);
document.addEventListener('webkitfullscreenchange', syncFS);
        // Star Rating Logic
        document.querySelectorAll('#starRating i').forEach(star => {
            star.addEventListener('click', function() {
                const val = this.getAttribute('data-value');
                document.querySelectorAll('#starRating i').forEach(s => {
                    s.style.color = s.getAttribute('data-value') <= val ? '#c5a059' : '#e5e7eb';
                });
            });
        });

        document.getElementById('submitFeedback').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('thankYou').classList.remove('hidden');
            setTimeout(() => location.reload(), 2000);
        });
    </script>
</body>
</html>
