<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Meeting | Paramount English Medium School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://meet.jit.si/external_api.js"></script>
    <link rel="icon" type="image/png" href="School logo 2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* FIX: Moved CSS out of brackets so it actually works */
      /* Container for the meeting */
#meeting-wrapper {
    position: relative; /* This is essential for the overlay to work */
    width: 100%;
    display: flex;
    justify-content: center;
    background: #111;
    padding: 20px 0;
}

#meeting-container {
    width: 95%;
    max-width: 1200px;
    height: calc(100vh - 250px);
    border-radius: 12px;
    overflow: hidden;
}

/* THE FIX: Anchor your logo to the TOP LEFT of the video frame */
.custom-watermark {
    position: absolute;
    top: 35px;    /* Distance from top of the meeting area */
    left: 45px;   /* Distance from left of the meeting area */
    z-index: 2147483647; /* Highest possible z-index to stay on top of the video */
    pointer-events: none; /* Allows clicks to pass through to buttons behind it */
}

.custom-watermark img {
    height: 55px; /* Size it slightly larger than the Jitsi logo to hide it completely */
    background-color: #1a1a1a; /* Adds a solid background color to mask what is underneath */
    padding: 5px;
    border-radius: 5px;
    filter: drop-shadow(0px 0px 5px rgba(0,0,0,0.8));
}
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="bg-white shadow-md p-4 flex justify-between items-center border-b-4 border-blue-600">
        <div class="flex items-center gap-4">
            <img src="School logo 2.png" alt="Paramount School Logo" class="h-12 w-12 object-contain">
            <div>
                <h1 class="text-xl font-bold text-gray-800 uppercase tracking-tight">Paramount English Medium School</h1>
                <p class="text-xs text-blue-600 font-semibold">Official Staff Meeting Portal</p>
            </div>
        </div>
        <div id="status" class="hidden md:block text-right">
            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Secure Connection</span>
        </div>
    </header>

  <main id="meeting-wrapper">
    <div class="custom-watermark">
        <img src="School logo 2.png" alt="Paramount Logo">
    </div>
    
    <div id="meeting-container"></div>
</main>

    <footer style="background: rgba(2, 6, 23, 0.98); padding: 40px 15px; text-align: center; border-top: 2px solid #c5a059;">
        <div class="footer-container" style="max-width: 1200px; margin: 0 auto;">
            <p style="margin-bottom: 20px; font-size: 0.8rem; opacity: 0.8; color: white; line-height: 1.6;">
                &copy; 2026, Paramount English Medium School. All Rights Reserved.<br>
                <span style="color: #c5a059; font-weight: bold; letter-spacing: 1px;">OFFICIAL STAFF MEETING PORTAL</span>
            </p>
            <div class="social-icons" style="margin-bottom: 25px;">
                <a href="https://www.facebook.com/paramountschoolwgl" target="_blank" style="color: white; font-size: 24px; margin: 0 15px;"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/paramount.07" target="_blank" style="color: white; font-size: 24px; margin: 0 15px;"><i class="fab fa-instagram"></i></a>
                <a href="https://youtube.com/@paramountschoolwgl" target="_blank" style="color: white; font-size: 24px; margin: 0 15px;"><i class="fab fa-youtube"></i></a>
                <a href="https://wa.me/919000641355" target="_blank" style="color: white; font-size: 24px; margin: 0 15px;"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <script>
        const domain = "meet.jit.si";
        const options = {
            roomName: "Paramount_Staff_Meeting_Room_Secure",
            width: "100%",
            height: "100%",
            parentNode: document.querySelector('#meeting-container'),
            configOverwrite: {
                startWithAudioMuted: true,
                startWithVideoMuted: false,
                enableLobbyChat: true,
                prejoinPageEnabled: false, // Bypasses the branded join screen
                disableThirdPartyRequests: true
            },
            interfaceConfigOverwrite: {
                SHOW_JITSI_WATERMARK: false,
                SHOW_WATERMARK_FOR_GUESTS: false,
                SHOW_BRAND_WATERMARK: false,
                BRAND_WATERMARK_LINK: "",
                DEFAULT_REMOTE_DISPLAY_NAME: 'Staff Member',
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'desktop', 'fullscreen',
                    'fms', 'hangup', 'profile', 'chat', 'settings', 
                    'raisehand', 'videoquality', 'tileview', 'security'
                ],
            }
        };
        const api = new JitsiMeetExternalAPI(domain, options);
    </script>
</body>
</html>
