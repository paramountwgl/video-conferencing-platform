<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramount Staff Portal | Private Meeting</title>
    <script src="https://8x8.vc/external_api.js"></script>
    <script src="https://8x8.vc/external_api.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="School logo 2.png">
    
    <style>
        :root { --gold: #c5a059; --dark-blue: #030a1a; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-blue); color: white; }
        
        #meeting-container {
            width: 100%;
            height: calc(100vh - 180px); /* Adjust based on your header/footer */
            background: #000;
        }
        /* Container for the meeting */
#meeting-wrapper {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    background: #000;
}
        /* Faster rendering for the meeting container */
#meeting-container {
    background: #000;
    width: 100%;
    height: calc(100vh - 200px);
    /* content-visibility tells the browser to skip rendering 
       the box until it's actually on screen */
    content-visibility: auto; 
    contain-intrinsic-size: 1000px;
}

/* Use transform for the logo instead of top/left for smoother motion */
.custom-watermark {
    will-change: transform;
    transform: translateZ(0); /* Force hardware acceleration */
}
      

/* THE "PATCH" LOGO: This sits exactly inside the frame at the left corner */
.custom-watermark {
    position: absolute;
    top: 20px; 
    left: 20px;
    z-index: 2147483647 !important; /* Forces it to the front */
    pointer-events: none;
    display: block;
}

.custom-watermark img {
    height: 60px; /* Size of your logo */
    background: transparent !important; /* Removes the box */
    border: none !important; /* Removes the border */
    filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5)); /* Makes it visible on light backgrounds */
}

/* This is the magic part for Fullscreen */
#meeting-wrapper:fullscreen .custom-watermark {
    position: fixed;
    top: 30px;
    left: 30px;
}
        
    </style>
</head>
<body>
    

    <header class="p-4 border-b-2 border-[#c5a059] flex justify-between items-center bg-[#020617]">
        <div class="flex items-center gap-3">
            <img src="School logo 2.png" class="h-12 w-12" alt="Logo">
            <div>
                <h1 style="font-family: 'Cinzel';" class="text-xl text-[#c5a059]">PARAMOUNT</h1>
                <p class="text-[10px] tracking-widest uppercase">Official Staff Meeting Room</p>
            </div>
            
        </div>
    </header>
   <main id="meeting-wrapper">
   
    <div id="meeting-container"></div>
</main>

    <footer style="background: rgba(2, 6, 23, 0.98); padding: 40px 15px; text-align: center; border-top: 2px solid #c5a059;">
        <div class="footer-container" style="max-width: 1200px; margin: 0 auto;">
            <p style="margin-bottom: 20px; font-size: 0.8rem; opacity: 0.8; color: white; line-height: 1.6;">
                &copy; 2026, Paramount English Medium School. All Rights Reserved.<br>
                <span style="color: #c5a059; font-weight: bold; letter-spacing: 1px;">OFFICIAL STAFF MEETING PORTAL</span>
            </p>
            <div class="social-icons" style="margin-bottom: 25px;">
                <a href="https://www.facebook.com/paramountschoolwgl" target="_blank" style="color: white; font-size: 24px; margin: 0 15px;"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/paramount.07" target="_blank" style="color: white; font-size: 24px; margin: 0 15px;"><i class="fab fa-instagram"></i></a>
                <a href="https://youtube.com/@paramountschoolwgl" target="_blank" style="color: white; font-size: 24px; margin: 0 15px;"><i class="fab fa-youtube"></i></a>
                <a href="https://wa.me/919000641355" target="_blank" style="color: white; font-size: 24px; margin: 0 15px;"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <div id="meeting-container"></div>

    <script>
       
        // REPLACE 'YOUR_APP_ID' with your actual ID from the 8x8 JaaS dashboard
const appId = "vpaas-magic-cookie-7e7f7c3e56a447c6a53a512920daf90c"; 
const roomName = "Staff_Meeting_Room";

const options = {
    roomName: appId + "/" + roomName,
    width: "100%",
    height: "100%",
    parentNode: document.querySelector('#meeting-container'),
    configOverwrite: {
        prejoinPageEnabled: false,
        disableThirdPartyRequests: true,
        // Remove this if you created it earlier
        dynamicBrandingUrl: "" 
    },
    interfaceConfigOverwrite: {
        // TURN EVERYTHING OFF
        SHOW_JITSI_WATERMARK: false,
        SHOW_WATERMARK_FOR_GUESTS: false,
        SHOW_BRAND_WATERMARK: false, 
        BRAND_WATERMARK_LINK: "",
        DEFAULT_LOGO_URL: "",
        
        // Ensure the toolbar is standard and clean
        TOOLBAR_BUTTONS: [
            'microphone', 'camera', 'desktop', 'fullscreen',
            'fms', 'hangup', 'profile', 'chat', 'settings', 
            'raisehand', 'videoquality', 'tileview', 'security'
        ],
    }
};
        window.onload = () => {
    // Wait 500ms after the page loads before starting the heavy video engine
    setTimeout(() => {
        const domain = "8x8.vc";
        const options = {
            roomName: appId + "/" + roomName,
            width: "100%",
            height: "100%",
            parentNode: document.querySelector('#meeting-container'),
            configOverwrite: {
                prejoinPageEnabled: false,
                // These two settings significantly speed up connection time
                enableWelcomePage: false,
                disableDeepLinking: true, 
            }
        };
       // Inside your existing script
const api = new JitsiMeetExternalAPI("8x8.vc", options);

let selectedRating = 0;

// Listen for the Hangup (Call Ended)
api.addEventListener('videoConferenceLeft', () => {
    // Hide the meeting container
    document.getElementById('meeting-container').style.display = 'none';
    // Show the Feedback Modal
    document.getElementById('feedbackModal').classList.remove('hidden');
});

// Star Rating Interaction
document.querySelectorAll('#starRating i').forEach(star => {
    star.addEventListener('click', function() {
        selectedRating = this.getAttribute('data-value');
        // Highlight stars
        document.querySelectorAll('#starRating i').forEach(s => {
            s.classList.toggle('text-[#c5a059]', s.getAttribute('data-value') <= selectedRating);
            s.classList.toggle('text-gray-300', s.getAttribute('data-value') > selectedRating);
        });
    });
});

// Submit Button Action
document.getElementById('submitFeedback').addEventListener('click', function() {
    if(selectedRating === 0) {
        alert("Please select a star rating first.");
        return;
    }
    
    // Hide button and stars
    document.getElementById('starRating').style.opacity = '0.5';
    this.style.display = 'none';
    
    // Show Thank You Message
    document.getElementById('thankYouMessage').classList.remove('hidden');

    // Optional: Refresh page or redirect after 3 seconds
    setTimeout(() => {
        location.reload();
    }, 3000);
});
    </script>
    <div id="feedbackModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[3000] hidden">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl border-t-4 border-[#c5a059]">
        <h2 class="font-['Cinzel'] text-[#030a1a] text-xl font-bold mb-2">Paramount Conference</h2>
        <p class="text-gray-600 text-sm mb-6 font-semibold uppercase tracking-wider">How was your experience?</p>
        
        <div class="flex justify-center gap-2 mb-8" id="starRating">
            <i class="fas fa-star text-3xl cursor-pointer text-gray-300 hover:text-[#c5a059]" data-value="1"></i>
            <i class="fas fa-star text-3xl cursor-pointer text-gray-300 hover:text-[#c5a059]" data-value="2"></i>
            <i class="fas fa-star text-3xl cursor-pointer text-gray-300 hover:text-[#c5a059]" data-value="3"></i>
            <i class="fas fa-star text-3xl cursor-pointer text-gray-300 hover:text-[#c5a059]" data-value="4"></i>
            <i class="fas fa-star text-3xl cursor-pointer text-gray-300 hover:text-[#c5a059]" data-value="5"></i>
        </div>

        <button id="submitFeedback" class="bg-[#030a1a] text-[#c5a059] px-8 py-3 rounded-full font-bold uppercase tracking-widest text-xs border border-[#c5a059] hover:bg-[#c5a059] hover:text-black transition-all w-full">
            Submit Rating
        </button>

        <div id="thankYouMessage" class="hidden mt-4 text-green-600 font-bold animate-bounce">
            Thank you for your response!
        </div>
    </div>
</div>
</body>
</html>
