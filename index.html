<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Meeting | Paramount English Medium School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="School logo 2.png">
    <style>
        #meeting-container {
            height: calc(100vh - 200px);
            min-height: 600px;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <header class="bg-white shadow-md p-4 flex justify-between items-center border-b-4 border-blue-600">
        <div class="flex items-center gap-4">
            <img src="School logo 2.png" alt="Paramount School Logo" class="h-16 w-16 object-contain">
            <div>
                <h1 class="text-xl font-bold text-gray-800 uppercase tracking-tight">Paramount English Medium School</h1>
                <p class="text-sm text-blue-600 font-semibold">Official Staff Meeting Portal</p>
            </div>
        </div>
        <div id="status" class="hidden md:block text-right">
            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Secure Connection</span>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4">
        <div id="meeting-container" class="bg-black rounded-xl overflow-hidden shadow-2xl border border-gray-200">
            </div>
    </main>

 <footer style="background: rgba(2, 6, 23, 0.98); padding: 40px 15px; text-align: center; border-top: 2px solid #c5a059; margin-top: auto;">
    <div class="footer-container" style="max-width: 1200px; margin: 0 auto;">
        
        <p style="margin-bottom: 20px; font-size: 0.8rem; opacity: 0.8; color: white; line-height: 1.6;">
            &copy; 2026, Paramount English Medium School. All Rights Reserved.<br>
            <span style="color: #c5a059; font-weight: bold; letter-spacing: 1px;">OFFICIAL STAFF MEETING PORTAL</span>
        </p>

        <h3 style="font-family: 'Cinzel', serif; color: #c5a059; margin-bottom: 20px; letter-spacing: 2px; font-size: 1.1rem; font-weight: 800;">
            CONNECT WITH US
        </h3>

        <div class="social-icons" style="margin-bottom: 25px;">
            <a href="https://www.facebook.com/paramountschoolwgl" target="_blank" style="color: white; font-size: 24px; margin: 0 15px; text-decoration: none; transition: 0.3s;"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/paramount.07" target="_blank" style="color: white; font-size: 24px; margin: 0 15px; text-decoration: none; transition: 0.3s;"><i class="fab fa-instagram"></i></a>
            <a href="https://youtube.com/@paramountschoolwgl" target="_blank" style="color: white; font-size: 24px; margin: 0 15px; text-decoration: none; transition: 0.3s;"><i class="fab fa-youtube"></i></a>
            <a href="https://wa.me/919000641355" target="_blank" style="color: white; font-size: 24px; margin: 0 15px; text-decoration: none; transition: 0.3s;"><i class="fab fa-whatsapp"></i></a>
        </div>

        <div style="border-top: 1px solid rgba(197, 160, 89, 0.2); pt-4; padding-top: 20px;">
            <p style="color: #c5a059; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px;">
                <i class="fas fa-map-marker-alt"></i> Laxmipur, Warangal 506005
            </p>
            <p style="color: white; font-size: 0.8rem; opacity: 0.7;">
                <i class="fas fa-envelope"></i> paramount0707@gmail.com
            </p>
        </div>
    </div>
</footer>

    <script>
        const domain = "meet.jit.si";
        const options = {
    roomName: "Paramount_Staff_Meeting_Room_Secure",
    width: "100%",
    height: "100%",
    parentNode: document.querySelector('#meeting-container'),
    configOverwrite: {
        prejoinPageEnabled: false, // Bypasses the screen in your screenshot entirely
        disableThirdPartyRequests: true,
        makeJsonLdData: false
    },
            configOverwrite: {
                startWithAudioMuted: true,
                startWithVideoMuted: false,
                enableLobbyChat: true, // This enables the "Waiting Room"
                prejoinPageEnabled: true // Staff can check camera/mic before entering
            },
            interfaceConfigOverwrite: {
        // Hides the watermarks and logos
        SHOW_JITSI_WATERMARK: false,
        SHOW_WATERMARK_FOR_GUESTS: false,
        SHOW_BRAND_WATERMARK: false,
        BRAND_WATERMARK_LINK: "",
        JITSI_WATERMARK_LINK: "",
        
        // Customizes the toolbar to keep it clean
        DEFAULT_REMOTE_DISPLAY_NAME: 'Staff Member',
        TOOLBAR_BUTTONS: [
            'microphone', 'camera', 'desktop', 'fullscreen',
            'fms', 'hangup', 'profile', 'chat', 'settings', 
            'raisehand', 'videoquality', 'tileview', 'security'
        ],
                SHOW_JITSI_WATERMARK: false,
                BRAND_WATERMARK_LINK: '',
                SHOW_WATERMARK_FOR_GUESTS: false
            }
        };
        const api = new JitsiMeetExternalAPI(domain, options);

        // Security Feature: Only allow host to let people in
        api.addEventListener('participantJoined', (event) => {
            console.log("New staff member joined:", event.displayName);
        });
    </script>
</body>
</html>
