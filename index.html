<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Paramount School | Admin Meeting Portal</title>
    
    <script src="https://8x8.vc/external_api.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a059; --dark-blue: #030a1a; }
        body { font-family: 'Poppins', sans-serif; background: #fff; color: #3c4043; margin: 0; overflow-y: auto; }

        header {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 2000;
            border-bottom: 1px solid #dadce0;
        }
        
        #meeting-wrapper { 
            display: none; 
            width: 100%; 
            height: 85vh;
            min-height: 550px;
            background: #000;
        }

        .btn-google { background: #1a73e8; color: white; padding: 10px 20px; border-radius: 4px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .input-code { border: 1px solid #dadce0; padding: 12px; border-radius: 4px; width: 260px; outline: none; }

        /* Fullscreen Button Styles */
        #brandedFS { font-size: 10px; font-weight: bold; border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 4px; transition: all 0.2s; }
        #brandedFS:hover { background: var(--gold); color: #000; }

        @media (max-width: 768px) {
            .hero-section { flex-direction: column-reverse; padding: 20px; text-align: center; }
            #meeting-wrapper { height: 75vh; }
            .fs-text { display: none; } /* Hide text on mobile for space */
        }
    </style>
</head>
<body class="flex flex-col" id="main-body">

    <header class="flex justify-between items-center px-4 md:px-6 py-3 shadow-sm">
        <div class="flex items-center gap-3">
            <img src="School logo 2.png" class="h-8 w-8 md:h-10 md:w-10 object-contain" alt="Logo">
            <span style="font-family: 'Cinzel';" class="text-lg md:text-xl text-[#c5a059] tracking-wider">PARAMOUNT</span>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4">
            <div class="hidden sm:flex items-center gap-2 bg-green-50 px-3 py-1 rounded-full border border-green-200">
                <i class="fas fa-shield-alt text-green-600 text-xs"></i>
                <span class="text-[9px] text-green-700 uppercase font-bold tracking-widest">Secure Connection</span>
            </div>
            
            <button id="brandedFS">
                <i class="fas fa-expand"></i> <span class="fs-text ml-1">FULLSCREEN</span>
            </button>
            
            <div class="text-gray-500 text-[10px] md:text-sm font-medium" id="live-clock"></div>
        </div>
    </header>

    <div id="landing-page">
        <main class="flex flex-col md:flex-row items-center justify-around p-10 min-height-[80vh]">
            <div class="hero-text max-w-xl">
                <h1 class="text-4xl md:text-5xl font-normal mb-6 leading-tight">Video calls and meetings for everyone</h1>
                <p class="text-lg text-gray-600 mb-10">Safe, secure, and fully managed numeric meetings for Paramount School.</p>
                
                <div class="flex flex-wrap items-center gap-4">
                    <button onclick="startMeeting('host')" class="btn-google">
                        <i class="fas fa-video"></i> New meeting
                    </button>
                    <div class="flex items-center gap-2">
                        <input type="number" id="room-input" class="input-code" placeholder="Enter numeric code">
                        <button onclick="startMeeting('join')" class="text-blue-600 font-semibold px-4 py-2 hover:bg-blue-50 rounded">Join</button>
                    </div>
                </div>
                <hr class="my-8 border-gray-200">
            </div>
            <div class="hero-image hidden md:block">
                <img src="https://www.gstatic.com/meet/user_edu_get_a_link_light_90939d3caedaa3015a864703dc15555d.svg" class="w-full max-w-md" alt="Meet">
            </div>
        </main>
    </div>

    <div id="meeting-wrapper">
        <div id="meeting-container" class="w-full h-full"></div>
    </div>

    <script>
        const APP_ID = "vpaas-magic-cookie-7e7f7c3e56a447c6a53a512920daf90c";
        let jitsiApi = null;

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function startMeeting(type) {
            let finalRoomID = "";
            let name = prompt(`Enter Your Name:`, type === 'host' ? "Admin/Host" : "Participant");
            if(!name) return;

            if (type === 'host') {
                const p1 = Math.floor(100 + Math.random() * 900);
                const p2 = Math.floor(100 + Math.random() * 900);
                const p3 = Math.floor(1000 + Math.random() * 9000);
                finalRoomID = `${p1}${p2}${p3}`;
                alert("ADMIN ACCESS GRANTED\nYour Numeric Meeting Code: " + finalRoomID);
            } else {
                finalRoomID = document.getElementById('room-input').value.replace(/\D/g, '');
                if (!finalRoomID) return alert("Please enter a numeric code.");
            }

            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('meeting-wrapper').style.display = 'block';

            const options = {
                roomName: APP_ID + "/" + finalRoomID,
                width: "100%",
                height: "100%",
                parentNode: document.querySelector('#meeting-container'),
                userInfo: { displayName: name },
                configOverwrite: {
                    prejoinPageEnabled: false,
                    // ADMIN CONTROLS
                    disableRemoteMute: false,
                    remoteVideoMenu: {
                        disableKick: false,
                        disableGrantModerator: false
                    },
                    // Allow host to lower hands
                    disableRaiseHand: false,
                },
                interfaceConfigOverwrite: {
                    // MUTE_EVERYONE and end meeting buttons
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'desktop', 'chat', 'raisehand',
                        'settings', 'videoquality', 'tileview', 'hangup', 'mute-everyone', 'security'
                    ],
                }
            };

            jitsiApi = new JitsiMeetExternalAPI("8x8.vc", options);

            // Host command to end meeting for everyone
            jitsiApi.addEventListener('videoConferenceJoined', () => {
                if (type === 'host') {
                    // Host can mute everyone on start if desired
                    // jitsiApi.executeCommand('muteEveryone');
                }
            });

            jitsiApi.addEventListener('videoConferenceLeft', () => {
                location.reload(); 
            });
        }

        // Fullscreen Logic
        const fsBtn = document.getElementById('brandedFS');
        const mainBody = document.getElementById('main-body');

        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (mainBody.requestFullscreen) mainBody.requestFullscreen();
                else if (mainBody.webkitRequestFullscreen) mainBody.webkitRequestFullscreen();
                fsBtn.innerHTML = '<i class="fas fa-compress"></i> <span class="fs-text ml-1">EXIT</span>';
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                fsBtn.innerHTML = '<i class="fas fa-expand"></i> <span class="fs-text ml-1">FULLSCREEN</span>';
            }
        });
    </script>
</body>
</html>
