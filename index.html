<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="title" content="Paramount School | Official Meeting Room">
    <meta name="description" content="Paramount English Medium School Official Conference Meeting Room. ">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://paramountwgl.github.io/school-ptm-2026/">
    <meta property="og:title" content="Paramount School | Official Meeting Room">
    <meta property="og:description" content="Paramount English Medium School Official Conference Meeting Room.">
    <meta property="og:image" content="https://paramountwgl.github.io/school-ptm-2026/School%20logo%202.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://paramountwgl.github.io/school-ptm-2026/">
    <meta property="twitter:title" content="Paramount School | Official Meeting Room">
    <meta property="twitter:description" content="Paramount English Medium School Official Conference Meeting Room.">
    <meta property="twitter:image" content="https://paramountwgl.github.io/school-ptm-2026/School%20logo%202.png">
    <title>Paramount Staff Portal | Private Meeting</title>
    
    <script src="https://8x8.vc/external_api.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="School logo 2.png">
    
    <style>
        :root { --gold: #c5a059; --dark-blue: #030a1a; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--dark-blue); 
            color: white; 
            margin: 0; 
            /* FIXED: Changed overflow: hidden to allow vertical scrolling */
            overflow-y: auto; 
            overflow-x: hidden;
            touch-action: auto; 
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: -1;
        }

        #meeting-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            background: #000;
            /* FIXED: Changed height to min-height to allow page expansion */
            min-height: calc(100vh - 140px); 
        }

        @media (max-width: 768px) {
            #meeting-wrapper { 
                min-height: calc(100vh - 120px); 
            }
            .name-main { font-size: 1.1rem !important; }
            .name-sub { font-size: 8px !important; }
        }

        #meeting-container { width: 100%; height: 100%; min-height: 500px; }

        /* Fullscreen adjustments */
        body:fullscreen #meeting-wrapper, 
        body:-webkit-full-screen #meeting-wrapper {
            height: calc(100vh - 70px) !important;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen" id="main-body">

    <header class="p-3 md:p-4 border-b-2 border-[#c5a059] flex justify-between items-center bg-[#020617] z-50">
        <div class="flex items-center gap-2 md:gap-4">
            <img src="School logo 2.png" class="h-10 w-10 md:h-12 md:w-12 object-contain" alt="Logo">
            <div>
                <h1 style="font-family: 'Cinzel';" class="name-main text-lg md:text-xl text-[#c5a059] leading-none">PARAMOUNT</h1>
                <p class="name-sub text-[8px] md:text-[10px] tracking-widest uppercase text-gray-400 mt-1">Staff Meeting Room</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="brandedFS" class="text-[10px] font-bold border border-[#c5a059] text-[#c5a059] px-4 py-2 rounded hover:bg-[#c5a059] hover:text-black transition-all flex items-center gap-2">
                <i class="fas fa-expand"></i> <span id="fsText">FULLSCREEN MODE</span>
            </button>
           
            <div class="hidden sm:block">
                <span class="text-[9px] bg-green-900/30 text-green-400 px-2 py-1 rounded-full border border-green-500/50 uppercase font-bold tracking-widest">Secure Connection</span>
            </div>
        </div>
    </header>

    <main id="meeting-wrapper">
        <div id="meeting-container"></div>
    </main>

    <footer class="bg-[#020617] py-4 md:py-6 text-center border-t border-gray-800">
        <div class="max-w-4xl mx-auto px-4">
            <p class="text-[9px] md:text-[11px] text-gray-500 mb-2 md:mb-4 uppercase tracking-widest font-semibold">
                &copy; 2026 Paramount English Medium School | All Rights Reserved | WARANGAL. 
            </p>
            <div class="flex justify-center gap-6 md:gap-8">
                <a href="https://www.facebook.com/paramountschoolwgl" target="_blank" class="text-white text-2xl hover:text-[#c5a059] transition-colors"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/paramount.07" target="_blank" class="text-white text-2xl hover:text-[#c5a059] transition-colors"><i class="fab fa-instagram"></i></a>
                <a href="https://youtube.com/@paramountschoolwgl" target="_blank" class="text-white text-2xl hover:text-[#c5a059] transition-colors"><i class="fab fa-youtube"></i></a>
                <a href="https://wa.me/919000641355" target="_blank" class="text-white text-2xl hover:text-[#c5a059] transition-colors"><i class="fab fa-whatsapp"></i></a>
                <a href="https://wa.me/919000641355" target="_blank" class="text-white text-2xl hover:text-[#c5a059] transition-colors"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <div id="feedbackModal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[9999] hidden p-4">
        <div class="bg-white rounded-3xl p-6 md:p-10 max-w-sm w-full text-center shadow-2xl border-b-8 border-[#c5a059]">
            <h2 style="font-family: 'Cinzel';" class="text-[#030a1a] text-xl md:text-2xl font-bold mb-2 uppercase">Session Ended</h2>
            <p class="text-gray-500 text-[9px] md:text-[10px] mb-6 md:mb-8 font-bold uppercase tracking-widest">How was your conference experience?</p>
            
            <div class="flex justify-center gap-2 md:gap-3 mb-8 md:mb-10" id="starRating">
                <i class="fas fa-star text-3xl md:text-4xl cursor-pointer text-gray-200" data-value="1"></i>
                <i class="fas fa-star text-3xl md:text-4xl cursor-pointer text-gray-200" data-value="2"></i>
                <i class="fas fa-star text-3xl md:text-4xl cursor-pointer text-gray-200" data-value="3"></i>
                <i class="fas fa-star text-3xl md:text-4xl cursor-pointer text-gray-200" data-value="4"></i>
                <i class="fas fa-star text-3xl md:text-4xl cursor-pointer text-gray-200" data-value="5"></i>
            </div>

            <button id="submitFeedback" class="bg-[#030a1a] text-[#c5a059] py-3 md:py-4 rounded-xl font-bold uppercase tracking-widest text-[10px] md:text-xs border-2 border-[#c5a059] hover:bg-[#c5a059] hover:text-black transition-all w-full">
                Submit Feedback
            </button>
            <div id="thankYou" class="hidden text-green-600 font-bold mt-4 animate-pulse text-sm">Thank you, Sir/Madam!</div>
        </div>
    </div>

    <script>
        const appId = "vpaas-magic-cookie-7e7f7c3e56a447c6a53a512920daf90c"; 
        const roomName = "Paramount_Staff_Secure_Meet";
        let api = null;
        let selectedRating = 0;

        window.onload = () => {
            setTimeout(() => {
                const options = {
                    roomName: appId + "/" + roomName,
                    width: "100%", height: "100%",
                    parentNode: document.querySelector('#meeting-container'),
                    configOverwrite: { 
                        prejoinPageEnabled: false, 
                        disableThirdPartyRequests: true,
                        disableDeepLinking: true 
                    },
                    interfaceConfigOverwrite: {
                        SHOW_JITSI_WATERMARK: false,
                        SHOW_BRAND_WATERMARK: false,
                        MOBILE_APP_PROMO: false,
                        TOOLBAR_BUTTONS: [
                            'microphone', 'camera', 'desktop', 'chat', 'settings', 
                            'raisehand', 'videoquality', 'tileview', 'hangup'
                        ],
                    }
                };
                api = new JitsiMeetExternalAPI("8x8.vc", options);
                
                api.addEventListener('videoConferenceLeft', () => {
                    if(document.fullscreenElement) document.exitFullscreen();
                    document.getElementById('meeting-wrapper').style.display = 'none';
                    document.getElementById('feedbackModal').classList.remove('hidden');
                });
            }, 800);
        };

        const fsBtn = document.getElementById('brandedFS');
        const fsText = document.getElementById('fsText');
        const body = document.getElementById('main-body');

        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (body.requestFullscreen) body.requestFullscreen();
                else if (body.webkitRequestFullscreen) body.webkitRequestFullscreen(); 
                fsText.innerText = "EXIT";
                fsBtn.querySelector('i').classList.replace('fa-expand', 'fa-compress');
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                fsText.innerText = "FULLSCREEN";
                fsBtn.querySelector('i').classList.replace('fa-compress', 'fa-expand');
            }
        });

        document.querySelectorAll('#starRating i').forEach(star => {
            star.addEventListener('click', function() {
                selectedRating = this.getAttribute('data-value');
                document.querySelectorAll('#starRating i').forEach(s => {
                    s.style.color = s.getAttribute('data-value') <= selectedRating ? '#c5a059' : '#e5e7eb';
                });
            });
        });

        document.getElementById('submitFeedback').addEventListener('click', function() {
            if(selectedRating === 0) return;
            this.style.display = 'none';
            document.getElementById('thankYou').classList.remove('hidden');
            setTimeout(() => location.reload(), 2500);
        });
    </script>
</body>
</html>
